name: franka_image

shape_meta: &shape_meta
  obs:
    camera_0:
      shape: [3, 84, 84]
      type: rgb
    robot0_eef_pos:
      shape: [3]
    robot0_eef_quat:
      shape: [4]
    robot0_gripper_qpos:
      shape: [1]
  action:
    shape: [4]

task_name: &task_name franka
dataset_type: &dataset_type real
dataset_path: &dataset_path ../data/franka_image/image.hdf5
abs_action: &abs_action False

